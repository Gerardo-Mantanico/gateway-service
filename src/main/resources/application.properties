server.port=${SERVER_PORT:8082}
spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true

# Eureka (soporte para override local via variables de entorno)
eureka.instance.instance-id=${spring.application.name}:${random.uuid}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:20.57.0.243}
eureka.instance.non-secure-port-enabled=${EUREKA_INSTANCE_NONSECURE_PORT_ENABLED:true}
eureka.instance.secure-port-enabled=${EUREKA_INSTANCE_SECURE_PORT_ENABLED:false}
eureka.instance.secure-port=8083
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:https://eureka-service-a6b0enhtggeqgwd7.eastus2-01.azurewebsites.net/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CORS global
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:*}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# ── AUTH-SERVICE ──────────────────────────────────────────────────────────
# 0. /api/auth/** → auth-service (con rewrite a /api/v1/auth/)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/auth/(?<segment>.*),/api/v1/auth/$\{segment}

# ── MS-PONENCIAS ──────────────────────────────────────────────────────────
# 1. Convocatorias
spring.cloud.gateway.routes[1].id=ms-ponencias-convocatorias
spring.cloud.gateway.routes[1].uri=lb://MS-PONENCIAS
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/convocatorias/**

# 2. Ponencias
spring.cloud.gateway.routes[2].id=ms-ponencias-ponencias
spring.cloud.gateway.routes[2].uri=lb://MS-PONENCIAS
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/ponencias/**

# 3. Estados de ponencia
spring.cloud.gateway.routes[3].id=ms-ponencias-estados
spring.cloud.gateway.routes[3].uri=lb://MS-PONENCIAS
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/estados-ponencia/**

# 4. Evaluaciones
spring.cloud.gateway.routes[4].id=ms-ponencias-evaluaciones
spring.cloud.gateway.routes[4].uri=lb://MS-PONENCIAS
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/evaluaciones/**

# ── MS-ASISTENCIAS-CERTIFICADOS ───────────────────────────────────────────
# 5. Asistencias
spring.cloud.gateway.routes[5].id=ms-asistencias-asistencias
spring.cloud.gateway.routes[5].uri=lb://MS-ASISTENCIAS-CERTIFICADOS
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/asistencias/**

# 6. Certificados
spring.cloud.gateway.routes[6].id=ms-asistencias-certificados
spring.cloud.gateway.routes[6].uri=lb://MS-ASISTENCIAS-CERTIFICADOS
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/certificados/**

# 7. Tipos de participacion
spring.cloud.gateway.routes[7].id=ms-asistencias-tipos-participacion
spring.cloud.gateway.routes[7].uri=lb://MS-ASISTENCIAS-CERTIFICADOS
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/tipos-participacion/**

# ── AUTH-SERVICE (catch-all para el resto de /api/v1) ─────────────────────
# 8. /api/v1/** → auth-service (usuarios, auth endpoints, etc.)
spring.cloud.gateway.routes[8].id=auth-service-v1
spring.cloud.gateway.routes[8].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/auth/**

# 9. Swagger / OpenAPI docs → auth-service
spring.cloud.gateway.routes[9].id=auth-service-swagger
spring.cloud.gateway.routes[9].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**,/webjars/**

# Header interno que el gateway agrega a todas las peticiones
app.gateway.secret=${APP_GATEWAY_SECRET:my-super-secret-value}
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Internal-Gateway, ${app.gateway.secret}
