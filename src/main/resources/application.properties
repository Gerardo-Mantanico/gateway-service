server.port=${SERVER_PORT:8082}
spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true

# Eureka
eureka.instance.instance-id=${spring.application.name}:${random.uuid}
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=https://eureka-service-a6b0enhtggeqgwd7.mexicocentral-01.azurewebsites.net/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CORS global
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:*}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# --- RUTAS CORREGIDAS ---

# 1. Ruta para Auth (mantiene tu StripPrefix para /api/auth)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# 2. Nueva Ruta para API V1 (Captura /api/v1/...)
# Esta ruta NO lleva StripPrefix porque tu microservicio ya tiene /api/v1 internamente
spring.cloud.gateway.routes[1].id=auth-service-v1
spring.cloud.gateway.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/**

# 3. Ruta para Swagger y Docs (Soporte para assets)
spring.cloud.gateway.routes[2].id=auth-service-swagger
spring.cloud.gateway.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**,/webjars/**

# Header secreto
app.gateway.secret=${APP_GATEWAY_SECRET:my-super-secret-value}
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Internal-Gateway, ${app.gateway.secret}